version: '3'

tasks:
  zsh-ac:
    desc: Creates zsh auto completion file
    cmds:
      - seed completion zsh > zsh.txt

  pwsh-ac:
    desc: Creates powershell auto completion file
    cmds:
      - seed completion powershell > pwsh.txt

  # Python / project convenience tasks
  py-install:
    desc: Create venv and install editable package
    cmds:
      - python -m venv venv
      - source venv/bin/activate && pip install -e .

  generate:
    desc: Run generator (examples/customer.yaml -> dataset.csv)
    cmds:
      - PYTHONPATH=src python -m seed.cli.main generate examples/customer.yaml --output dataset.csv

  generate-quiet:
    desc: Run generator quietly (no progress output)
    cmds:
      - PYTHONPATH=src python -m seed.cli.main generate examples/customer.yaml --output dataset.csv -q

  validate:
    desc: Validate an example config
    cmds:
      - PYTHONPATH=src python -m seed.cli.main validate examples/customer.yaml

  inspect:
    desc: Inspect an example config
    cmds:
      - PYTHONPATH=src python -m seed.cli.main inspect examples/customer.yaml

  clean:
    desc: Remove generated artifacts
    cmds:
      - rm -f dataset.csv customers_example.csv customers.csv || true
